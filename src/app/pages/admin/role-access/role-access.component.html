<div class="dashboard-main-body role-page">
  <section class="role-hero">
    <div>
      <p class="role-eyebrow">Access Control</p>
      <h2>Role & Access Management</h2>
      <p>Create custom roles and manage permission groups for staff users.</p>
      <div class="role-meta">
        <span>{{ roles.length }} roles</span>
      </div>
    </div>
    <ul class="role-breadcrumb">
      <li><a routerLink="/dashboard">Dashboard</a></li>
      <li>/</li>
      <li>Role Access</li>
    </ul>
  </section>

  <div class="row gy-4">
    <div class="col-md-4">
      <div class="role-card">
        <div class="role-card-head">
          <h6>Add New Role</h6>
        </div>
        <div class="role-card-body">
          <label class="field-label">Role Name</label>
          <input type="text" class="field-input" [(ngModel)]="newRoleName" placeholder="e.g. Librarian">
          <button class="btn-primary-gradient mt-3 w-100 d-flex align-items-center justify-content-center gap-2" (click)="addRole()">
            <iconify-icon icon="solar:add-circle-bold"></iconify-icon>
            Add Role
          </button>
        </div>
      </div>
    </div>

    <div class="col-md-8">
      <div class="role-card">
        <div class="role-card-head">
          <h6>Existing Roles</h6>
        </div>
        <div class="role-card-body p-0">
          <div class="role-table-wrap">
            <table class="role-table">
              <thead>
                <tr>
                  <th>Role Name</th>
                  <th>Permissions</th>
                  <th class="text-center">Action</th>
                </tr>
              </thead>
              <tbody>
                <tr *ngFor="let role of roles">
                  <td><span class="role-name">{{ role.name }}</span></td>
                  <td>
                    <div class="perm-wrap">
                      <span *ngFor="let perm of role.permissions" class="perm-chip">{{ perm }}</span>
                      <span *ngIf="!role.permissions?.length" class="text-muted">No permissions</span>
                    </div>
                  </td>
                  <td class="text-center">
                    <button class="icon-btn delete-btn" (click)="deleteRole(role.id)" title="Delete Role">
                      <iconify-icon icon="solar:trash-bin-trash-bold"></iconify-icon>
                    </button>
                  </td>
                </tr>
                <tr *ngIf="roles?.length === 0">
                  <td colspan="3" class="role-empty">
                    <iconify-icon icon="solar:user-block-bold-duotone"></iconify-icon>
                    <p>No roles found.</p>
                  </td>
                </tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
