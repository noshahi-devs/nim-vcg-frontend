<div class="dashboard-main-body theme-page">
  <app-breadcrumb [title]="title"></app-breadcrumb>

  <section class="theme-hero">
    <div class="theme-hero-content">
      <p class="theme-eyebrow">Brand Studio</p>
      <h2>Theme & Visual Identity</h2>
      <p>Control logo, color signature, and visual personality of your admin workspace.</p>
    </div>
    <span class="theme-badge">System Preferences</span>
  </section>

  <section class="theme-panel">
    <h5>Brand Configuration</h5>
    <div class="theme-grid">
      <div class="theme-card">
        <label>Primary Designation</label>
        <div class="theme-upload-box">
          <input type="file" id="logoUpload" class="d-none">
          <label for="logoUpload" class="theme-upload-trigger">
            <iconify-icon icon="solar:upload-minimalistic-bold-duotone"></iconify-icon>
            <span>Upload Brand Assets</span>
          </label>
        </div>
      </div>

      <div class="theme-card">
        <label>Color Signature</label>
        <div class="theme-color-row">
          <button type="button" class="color-orb active" style="background: #486cea;"></button>
          <button type="button" class="color-orb" style="background: #ef4444;"></button>
          <button type="button" class="color-orb" style="background: #10b981;"></button>
          <button type="button" class="color-orb" style="background: #f59e0b;"></button>
        </div>
      </div>
    </div>

    <div class="theme-actions">
      <button type="button" class="theme-btn">Apply Transformation</button>
    </div>
  </section>
</div>
