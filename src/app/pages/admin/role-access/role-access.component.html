<app-breadcrumb [title]="'Role & Access Management'" [icon]="'solar:shield-user-bold-duotone'"></app-breadcrumb>

<div class="row gy-4">
  <div class="col-md-4">
    <div class="role-card add-role-card">
      <div class="role-card-head">
        <h6>Add New Role</h6>
      </div>
      <div class="role-card-body">
        <div class="mb-4">
          <label class="field-label">Role Name</label>
          <input type="text" class="field-input" [(ngModel)]="newRoleName" placeholder="e.g. Librarian">
        </div>

        <div class="permissions-section mb-4">
          <label class="field-label mb-3">Select Permissions</label>
          <div class="permissions-grid">
            <label *ngFor="let perm of availablePermissions" class="perm-checkbox-item">
              <input type="checkbox" [checked]="selectedPermissions.has(perm)" (change)="togglePermission(perm)">
              <span class="custom-checkbox"></span>
              <span class="perm-label">{{ perm }}</span>
            </label>
          </div>
        </div>

        <button class="btn-primary-gradient w-100 d-flex align-items-center justify-content-center gap-2"
          (click)="addRole()" [disabled]="isSaving">
          <iconify-icon *ngIf="isSaving" icon="line-md:loading-twotone-loop"></iconify-icon>
          <iconify-icon *ngIf="!isSaving" icon="solar:add-circle-bold"></iconify-icon>
          {{ isSaving ? 'Saving...' : 'Create Role' }}
        </button>
      </div>
    </div>
  </div>

  <div class="col-md-8">
    <div class="role-card">
      <div class="role-card-head">
        <h6>Existing Roles</h6>
      </div>
      <div class="role-card-body p-0">
        <div class="role-table-wrap">
          <table class="role-table">
            <thead>
              <tr>
                <th>Role Name</th>
                <th>Permissions</th>
                <th class="text-center">Action</th>
              </tr>
            </thead>
            <tbody>
              <tr *ngFor="let role of roles">
                <td><span class="role-name">{{ role.name }}</span></td>
                <td>
                  <div class="perm-wrap">
                    <span *ngFor="let perm of role.permissions" class="perm-chip">{{ perm }}</span>
                    <span *ngIf="!role.permissions?.length" class="text-muted">No permissions</span>
                  </div>
                </td>
                <td class="text-center">
                  <button class="icon-btn delete-btn" (click)="deleteRole(role.id)" title="Delete Role">
                    <iconify-icon icon="solar:trash-bin-trash-bold"></iconify-icon>
                  </button>
                </td>
              </tr>
              <tr *ngIf="roles?.length === 0">
                <td colspan="3" class="role-empty">
                  <iconify-icon icon="solar:user-block-bold-duotone"></iconify-icon>
                  <p>No roles found.</p>
                </td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- PREMIUM ACTION MODALS -->

<!-- 1. DELETION CONFIRMATION MODAL -->
<div class="premium-overlay" *ngIf="showDeleteConfirmModal">
  <div class="premium-modal">
    <div class="pm-sparkles">
      <div class="pm-sparkle sp1"></div>
      <div class="pm-sparkle sp2"></div>
      <div class="pm-sparkle sp3"></div>
    </div>

    <div class="pm-icon-ring danger-ring">
      <iconify-icon icon="solar:trash-bin-trash-bold" style="font-size: 38px; color: #fff;"></iconify-icon>
    </div>

    <h3 class="pm-title">Confirm Deletion</h3>
    <p class="pm-subtitle">
      Are you sure you want to delete this <strong>Role</strong>? Users assigned to this role might lose access.
    </p>

    <div class="pm-actions">
      <button class="pm-btn pm-cancel" (click)="cancelDelete()">Cancel</button>
      <button class="pm-btn pm-error-btn" (click)="confirmDeleteRole()" [disabled]="isSaving">
        <iconify-icon *ngIf="isSaving" icon="line-md:loading-twotone-loop" style="font-size: 20px;"></iconify-icon>
        {{ isSaving ? 'Deleting...' : 'Yes, Delete' }}
      </button>
    </div>
  </div>
</div>

<!-- 2. UNIFIED FEEDBACK MODAL (Success/Error/Warning) -->
<div class="premium-overlay" *ngIf="showFeedbackModal">
  <div class="premium-modal feedback-modal">
    <div class="pm-sparkles">
      <div class="pm-sparkle sp1"></div>
      <div class="pm-sparkle sp2"></div>
      <div class="pm-sparkle sp3"></div>
    </div>

    <div class="pm-icon-ring" [ngClass]="{
           'success-ring': feedbackType === 'success',
           'danger-ring': feedbackType === 'error',
           'warning-ring': feedbackType === 'warning'
         }">
      <iconify-icon [icon]="feedbackType === 'success' ? 'solar:check-circle-bold' : 
                        feedbackType === 'error' ? 'solar:danger-bold' : 'solar:notification-lines-remove-bold'"
        style="font-size: 38px; color: #fff;"></iconify-icon>
    </div>

    <h3 class="pm-title">{{ feedbackTitle }}</h3>
    <p class="pm-subtitle" [innerHTML]="feedbackMessage"></p>

    <div class="pm-actions">
      <button class="pm-btn pm-Ok" [ngClass]="{
                'pm-success-btn': feedbackType === 'success',
                'pm-error-btn': feedbackType === 'error',
                'pm-warning-btn': feedbackType === 'warning'
              }" (click)="closeFeedback()">
        Ok
      </button>
    </div>
  </div>
</div>
