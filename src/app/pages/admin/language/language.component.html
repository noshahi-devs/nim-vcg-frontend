<div class="dashboard-main-body language-page">
  <app-breadcrumb [title]="'Settings - Languages'" [main-title]="'Languages'"></app-breadcrumb>

  <section class="language-hero">
    <div class="language-hero-content">
      <p class="language-eyebrow">Localization</p>
      <h2>Language Settings</h2>
      <p>Manage supported system languages and toggle availability for users.</p>
    </div>
    <button type="button" class="language-add-btn" data-bs-toggle="modal" data-bs-target="#exampleModal">
      <iconify-icon icon="ic:baseline-plus"></iconify-icon>
      Add Language
    </button>
  </section>

  <section class="language-panel">
    <div class="language-controls">
      <div class="language-control-left">
        <span>Show</span>
        <select class="language-select">
          <option>10</option>
          <option>25</option>
          <option>50</option>
        </select>
        <span>entries</span>
      </div>

      <form class="language-search">
        <input type="text" name="search" placeholder="Search language">
        <iconify-icon icon="ion:search-outline"></iconify-icon>
      </form>
    </div>

    <div class="table-responsive">
      <table class="language-table">
        <thead>
          <tr>
            <th>S.L</th>
            <th class="text-center">Name</th>
            <th class="text-center">Status</th>
            <th class="text-center">Action</th>
          </tr>
        </thead>
        <tbody>
          <tr>
            <td>01</td>
            <td class="text-center">English (Default)</td>
            <td class="text-center"><input class="form-check-input" type="checkbox" checked></td>
            <td class="text-center">
              <div class="language-actions">
                <button type="button" class="action-btn edit" data-bs-toggle="modal" data-bs-target="#exampleModalEdit">
                  <iconify-icon icon="lucide:edit"></iconify-icon>
                </button>
                <button type="button" class="remove-item-button action-btn delete">
                  <iconify-icon icon="fluent:delete-24-regular"></iconify-icon>
                </button>
              </div>
            </td>
          </tr>
          <tr>
            <td>02</td>
            <td class="text-center">Urdu</td>
            <td class="text-center"><input class="form-check-input" type="checkbox"></td>
            <td class="text-center">
              <div class="language-actions">
                <button type="button" class="action-btn edit" data-bs-toggle="modal" data-bs-target="#exampleModalEdit">
                  <iconify-icon icon="lucide:edit"></iconify-icon>
                </button>
                <button type="button" class="remove-item-button action-btn delete">
                  <iconify-icon icon="fluent:delete-24-regular"></iconify-icon>
                </button>
              </div>
            </td>
          </tr>
          <tr>
            <td>03</td>
            <td class="text-center">Arabic</td>
            <td class="text-center"><input class="form-check-input" type="checkbox"></td>
            <td class="text-center">
              <div class="language-actions">
                <button type="button" class="action-btn edit" data-bs-toggle="modal" data-bs-target="#exampleModalEdit">
                  <iconify-icon icon="lucide:edit"></iconify-icon>
                </button>
                <button type="button" class="remove-item-button action-btn delete">
                  <iconify-icon icon="fluent:delete-24-regular"></iconify-icon>
                </button>
              </div>
            </td>
          </tr>
        </tbody>
      </table>
    </div>

    <div class="language-footer">
      <span>Showing 1 to 3 of 3 entries</span>
      <ul class="pagination d-flex align-items-center gap-2 mb-0">
        <li class="page-item"><a class="page-link" href="javascript:void(0)">1</a></li>
      </ul>
    </div>
  </section>
</div>

<div class="modal fade" id="exampleModalEdit" tabindex="-1" aria-labelledby="exampleModalEditLabel" aria-hidden="true">
  <div class="modal-dialog modal-lg modal-dialog-centered">
    <div class="modal-content radius-16 bg-base">
      <div class="modal-header py-16 px-24 border border-top-0 border-start-0 border-end-0">
        <h1 class="modal-title fs-5" id="exampleModalEditLabel">Edit Language</h1>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>
      <div class="modal-body p-24">
        <form>
          <div class="row">
            <div class="col-6 mb-20">
              <label for="editname" class="form-label fw-semibold text-primary-light text-sm mb-8">Language Name</label>
              <input type="text" class="form-control radius-8" id="editname" placeholder="Enter Name">
            </div>
            <div class="col-6 mb-20">
              <label for="editcountry" class="form-label fw-semibold text-primary-light text-sm mb-8">Status</label>
              <select class="form-control radius-8 form-select" id="editcountry">
                <option selected disabled>Select One</option>
                <option>ON</option>
                <option>OFF</option>
              </select>
            </div>
            <div class="d-flex align-items-center justify-content-center gap-3 mt-24">
              <button type="reset" class="border border-danger-600 bg-hover-danger-200 text-danger-600 text-md px-50 py-11 radius-8">Cancel</button>
              <button type="button" data-bs-dismiss="modal" aria-label="Close" class="btn btn-primary border border-primary-600 text-md px-50 py-12 radius-8">Update</button>
            </div>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>

<div class="modal fade" id="exampleModal" tabindex="-1" aria-labelledby="exampleModalLabel" aria-hidden="true">
  <div class="modal-dialog modal-lg modal-dialog-centered">
    <div class="modal-content radius-16 bg-base">
      <div class="modal-header py-16 px-24 border border-top-0 border-start-0 border-end-0">
        <h1 class="modal-title fs-5" id="exampleModalLabel">Add New Language</h1>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>
      <div class="modal-body p-24">
        <form>
          <div class="row">
            <div class="col-6 mb-20">
              <label for="name" class="form-label fw-semibold text-primary-light text-sm mb-8">Language Name</label>
              <input type="text" class="form-control radius-8" id="name" placeholder="Enter Name">
            </div>
            <div class="col-6 mb-20">
              <label for="country" class="form-label fw-semibold text-primary-light text-sm mb-8">Status</label>
              <select class="form-control radius-8 form-select" id="country">
                <option selected disabled>Select One</option>
                <option>ON</option>
                <option>OFF</option>
              </select>
            </div>
            <div class="d-flex align-items-center justify-content-center gap-3 mt-24">
              <button type="reset" class="border border-danger-600 bg-hover-danger-200 text-danger-600 text-md px-50 py-11 radius-8">Reset</button>
              <button type="submit" class="btn btn-primary border border-primary-600 text-md px-50 py-12 radius-8">Save Change</button>
            </div>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
