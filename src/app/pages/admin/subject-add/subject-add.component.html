<div class="dashboard-main-body">
  <app-breadcrumb [title]="title"></app-breadcrumb>

  <div class="row justify-content-center">
    <div class="col-md-10 mt-4">
      <div class="fee-card">
        <div class="fee-card-header premium-header d-flex align-items-center justify-content-between">
          <h5 class="fw-semibold mb-0" style="color: white;">Add Subjects</h5>
        </div>

        <div class="fee-card-body px-24 py-16">
          <form #subjectForm="ngForm" (ngSubmit)="onSubmit(subjectForm)" novalidate>

            <!-- Select Class -->
            <div class="form-card mb-4">
              <div class="form-card-label">
                <span class="card-dot blue"></span>
                Class Selection
              </div>
              <div class="form-group-premium mt-3">
                <label class="field-label">Select Class <span class="text-danger">*</span></label>
                <div class="select-wrapper-premium">
                  <select class="field-select" name="selectedClassId" [(ngModel)]="selectedClassId" required
                    #classSelect="ngModel" [ngClass]="{ 'is-invalid': classSelect.invalid && classSelect.touched }">
                    <option value="" disabled selected>Select a Class</option>
                    <option *ngFor="let c of classes" [value]="c.standardId">{{ c.standardName }}</option>
                  </select>
                  <svg class="field-chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                    <polyline points="6 9 12 15 18 9" />
                  </svg>
                </div>
                <small *ngIf="classSelect.invalid && classSelect.touched" class="text-danger mt-1 d-block">
                  Please select a class
                </small>
              </div>
            </div>

            <!-- Dynamic Subject Fields -->
            <div class="form-card mb-4">
              <div class="d-flex justify-content-between align-items-center mb-0">
                <div class="form-card-label mb-0">
                  <span class="card-dot green"></span>
                  Subjects
                </div>
                <button type="button" class="btn-secondary-premium" (click)="addMoreSubject()"
                  style="padding: 8px 16px;">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" class="me-1"
                    style="width: 18px; height: 18px;">
                    <path d="M12 5v14M5 12h14" />
                  </svg>
                  Add More
                </button>
              </div>

              <div *ngFor="let subject of subjects; let i = index" class="row align-items-end mt-3">
                <div class="col-md-10">
                  <div class="form-group-premium">
                    <label class="field-label">Subject Name <span class="text-danger">*</span></label>
                    <input type="text" class="field-input" [(ngModel)]="subject.subjectName" [name]="'subjectName_' + i"
                      placeholder="e.g., Mathematics" required />
                  </div>
                </div>
                <div class="col-md-2" style="padding-bottom: 4px;">
                  <button type="button"
                    class="icon-btn delete-btn w-100 d-flex align-items-center justify-content-center gap-2"
                    style="height: 48px; border-radius: 12px; background: rgba(239, 68, 68, 0.1); color: #ef4444;"
                    (click)="removeSubject(i)" [disabled]="subjects.length === 1">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
                      style="width: 18px; height: 18px;">
                      <line x1="5" y1="12" x2="19" y2="12" />
                    </svg>
                    Remove
                  </button>
                </div>
              </div>
            </div>

            <div class="d-flex align-items-center justify-content-end gap-3 mt-48">
              <button type="button" (click)="onSubmit(subjectForm)"
                class="btn-primary-gradient px-40 py-3 radius-12 d-flex align-items-center gap-3 shadow-lg"
                [disabled]="isProcessing" style="min-height: 54px; transition: all 0.3s ease;">
                <iconify-icon *ngIf="isProcessing" icon="line-md:loading-twotone-loop"
                  style="font-size: 24px;"></iconify-icon>
                <iconify-icon *ngIf="!isProcessing" icon="solar:diskette-bold-duotone"
                  style="font-size: 24px;"></iconify-icon>
                <span class="fw-bold fs-5">{{ isProcessing ? 'Processing...' : 'Save Subject' }}</span>
              </button>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>

  <!-- UNIFIED FEEDBACK MODAL (Success/Error/Warning) -->
  <div class="premium-overlay" *ngIf="showFeedbackModal">
    <div class="premium-modal feedback-modal">
      <div class="pm-sparkles">
        <div class="pm-sparkle sp1"></div>
        <div class="pm-sparkle sp2"></div>
        <div class="pm-sparkle sp3"></div>
      </div>

      <div class="pm-icon-ring" [ngClass]="{
             'success-ring': feedbackType === 'success',
             'danger-ring': feedbackType === 'error',
             'warning-ring': feedbackType === 'warning'
           }">
        <iconify-icon [icon]="feedbackType === 'success' ? 'solar:check-circle-bold' : 
                          feedbackType === 'error' ? 'solar:danger-bold' : 'solar:notification-lines-remove-bold'"
          style="font-size: 38px; color: #fff;"></iconify-icon>
      </div>

      <h3 class="pm-title">{{ feedbackTitle }}</h3>
      <p class="pm-subtitle" [innerHTML]="feedbackMessage"></p>

      <div class="pm-actions">
        <button class="pm-btn pm-Ok" [ngClass]="{
                  'pm-success-btn': feedbackType === 'success',
                  'pm-error-btn': feedbackType === 'error',
                  'pm-warning-btn': feedbackType === 'warning'
                }" (click)="closeFeedback()">
          Ok
        </button>
      </div>
    </div>
  </div>

  <!-- PROCESSING / LOADING OVERLAY -->
  <div class="premium-overlay processing-overlay" *ngIf="isProcessing">
    <div class="processing-card">
      <div class="loader-ring">
        <div class="loader-inner"></div>
      </div>
      <div class="processing-content">
        <h4 class="pc-title">Securely Processing</h4>
        <p class="pc-subtitle">Creating academic subject registry...</p>
      </div>
    </div>
  </div>
</div>
