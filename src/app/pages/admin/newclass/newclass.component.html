<div class="dashboard-main-body">
  <app-breadcrumb [title]="title"></app-breadcrumb>

  <div class="row justify-content-center">
    <div class="col-md-7">
      <div class="card outstanding-card mt-4">
        <div class="card-header outstanding-header text-center">
          <iconify-icon icon="solar:folder-plus-bold-duotone" class="text-4xl mb-2"></iconify-icon>
          <h5 class="mb-0">Create New Class</h5>
          <div class="section-divider"></div>
        </div>

        <div class="card-body p-40">
          <form #classForm="ngForm" (ngSubmit)="onSubmit(classForm)" novalidate>

            <div class="row">
              <!-- CLASS NAME -->
              <div class="col-12 mb-4">
                <label class="form-label fw-bold text-dark mb-2">
                  Class Name <span class="text-danger">*</span>
                </label>
                <div class="form-floating-custom">
                  <iconify-icon icon="solar:letter-bold-duotone"></iconify-icon>
                  <input type="text" class="form-control" name="standardName" [(ngModel)]="newClass.standardName"
                    required #standardName="ngModel"
                    [ngClass]="{ 'is-invalid': standardName.invalid && standardName.touched }"
                    placeholder="e.g. 10th Grade, BSCS" />
                </div>
                <small *ngIf="standardName.invalid && standardName.touched"
                  class="text-danger animate__animated animate__fadeIn">
                  Class name is required
                </small>
              </div>

            </div>

            <div class="d-flex align-items-center justify-content-center gap-3 mt-40">
              <button type="button" class="outstanding-btn d-flex align-items-center gap-2" [disabled]="isProcessing"
                (click)="onSubmit(classForm)">
                <iconify-icon *ngIf="isProcessing" icon="line-md:loading-twotone-loop"
                  style="font-size: 20px;"></iconify-icon>
                <iconify-icon *ngIf="!isProcessing" icon="solar:check-read-bold-duotone" class="text-xl"></iconify-icon>
                <span>{{ isProcessing ? 'Processing...' : 'Save' }}</span>
              </button>
            </div>

          </form>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- ============================================================
     PREMIUM MODALS & OVERLAYS
     ============================================================ -->

<!-- UNIFIED FEEDBACK MODAL (Success/Error/Warning) -->
<div class="premium-overlay" *ngIf="showFeedbackModal">
  <div class="premium-modal feedback-modal">
    <div class="pm-sparkles">
      <div class="pm-sparkle sp1"></div>
      <div class="pm-sparkle sp2"></div>
      <div class="pm-sparkle sp3"></div>
    </div>

    <div class="pm-icon-ring" [ngClass]="{
           'success-ring': feedbackType === 'success',
           'danger-ring': feedbackType === 'error',
           'warning-ring': feedbackType === 'warning'
         }">
      <iconify-icon [icon]="feedbackType === 'success' ? 'solar:check-circle-bold' : 
                        feedbackType === 'error' ? 'solar:danger-bold' : 'solar:notification-lines-remove-bold'"
        style="font-size: 38px; color: #fff;"></iconify-icon>
    </div>

    <h3 class="pm-title">{{ feedbackTitle }}</h3>
    <p class="pm-subtitle" [innerHTML]="feedbackMessage"></p>

    <div class="pm-actions">
      <button class="pm-btn pm-Ok" [ngClass]="{
                'pm-success-btn': feedbackType === 'success',
                'pm-error-btn': feedbackType === 'error',
                'pm-warning-btn': feedbackType === 'warning'
              }" (click)="closeFeedback()">
        Ok
      </button>
    </div>
  </div>
</div>

<!-- PROCESSING / LOADING OVERLAY -->
<div class="premium-overlay processing-overlay" *ngIf="isProcessing">
  <div class="processing-card">
    <div class="loader-ring">
      <div class="loader-inner"></div>
    </div>
    <div class="processing-content">
      <h4 class="pc-title">Processing please wait...</h4>
      <p class="pc-subtitle">Creating new class structure...</p>
    </div>
  </div>
</div>
